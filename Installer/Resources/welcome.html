  <h2>trucComp@Bus — Bus Compressor</h2>
  <p>コーラスバス用のシンプルなステレオバスコンプレッサーです。</p>
  <p><strong>S Mode</strong>（SSLチャンネル系）と<strong>A Mode</strong>（API/VCA系・プリアンプ飽和付き）の
     2つのキャラクターを切り替えられます。</p>
  <p>このインストーラーは以下をインストールします：</p>
  <ul>
    <li>VST3 → <code>/Library/Audio/Plug-Ins/VST3/</code></li>
    <li>AU &nbsp; → <code>/Library/Audio/Plug-Ins/Components/</code></li>
  </ul>
  <p>製造元：truc &nbsp;|&nbsp; バージョン：1.1.0</p>
</body>
